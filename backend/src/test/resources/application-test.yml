spring:
  datasource:
    url: jdbc:h2:mem:pmsdb-test
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false
  sql:
    init:
      data-locations: classpath:test-data.sql
      mode: always
